[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".venv", "build", "release"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "C4", "UP", "SIM", "PIE", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
show_error_codes = true
pretty = true
files = ["app.py", "gifmaker", "scripts"]
exclude = ["build", "release", ".venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--strict-config", "--strict-markers"]
