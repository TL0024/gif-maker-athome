name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # Required to upload CodeQL analysis results.
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyze source
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          category: /language:${{ matrix.language }}
